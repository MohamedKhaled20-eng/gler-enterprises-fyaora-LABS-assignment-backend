errors:
  text-replace:
    null-input:
      code: TR001
      message: Text cannot be null
      description: The input text parameter is required and cannot be null
    too-short:
      code: TR002
      message: Text is too short
      description: The input text must be at least 2 characters long
  forecast:
    api-unreachable:
      code: FC001
      message: Connection to the upstream is unreachable
      description: Unable to connect to the external weather API service
    empty-data:
      code: FC002
      message: Upstream API returned empty data
      description: The external weather API returned no data or incomplete response
  validation:
    missing-fields:
      code: VAL001
      message: Missing or invalid mandatory fields
      description: One or more required fields are missing or contain invalid values
  generic:
    internal-error:
      code: SYS001
      message: Internal Server Error
      description: An unexpected error occurred while processing the request
    upstream-error:
      code: SYS002
      message: Upstream API Unreachable
      description: External service is currently unavailable

